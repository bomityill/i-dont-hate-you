<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investigation</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffd6e7,#7b1e3a);
    font-family:Arial,sans-serif;
    overflow:hidden;
    color:#4a1025;
}

.container{
    width:90%;
    max-width:370px;
    background:white;
    padding:30px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    position:relative;
    animation:fadeIn 0.5s ease;
}

h1{
    font-size:24px;
    margin-bottom:15px;
}

p{
    line-height:1.6;
    font-size:16px;
}

button{
    padding:13px 22px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
    margin-top:15px;
}

button:hover{
    transform:scale(1.05);
}

.yesBtn{
    background:#7b1e3a;
    color:white;
    position:absolute;
}

.noBtn{
    background:#ff8eb5;
    color:white;
}

.progress{
    width:100%;
    height:10px;
    background:#f5d1de;
    border-radius:20px;
    overflow:hidden;
    margin-top:20px;
}

.bar{
    width:0%;
    height:100%;
    background:#7b1e3a;
    transition:1s;
}

.small{
    font-size:12px;
    opacity:0.7;
    margin-top:15px;
}

.heart{
    position:absolute;
    color:#ff8eb5;
    font-size:20px;
    animation:float 6s linear infinite;
}

.floatText{
    position:absolute;
    color:#ff4d88;
    font-size:14px;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh);opacity:1;}
    to{transform:translateY(-120vh);opacity:0;}
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container" id="main">

<h1>INTERROGATION STARTED 🚨</h1>

<p>Do you genuinely think I hate you?</p>

<button class="yesBtn" id="yesBtn">Yes 😔</button>
<button class="noBtn" onclick="beginJourney()">No 😌</button>

<div class="progress"><div class="bar" id="bar"></div></div>

<p class="small">Emotional investigation loading...</p>

</div>

<script>

/* ================= FLOATING HEARTS ================= */

function createHearts(){
const h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
}
setInterval(createHearts,900);

/* ================= FLOATING CHAOS TEXT ================= */

function floatText(){
const t=document.createElement("div");
t.className="floatText";
t.innerText=["dramatic.","sus.","hmm.","attention detected.","interesting."][Math.floor(Math.random()*5)];
t.style.left=Math.random()*100+"vw";
document.body.appendChild(t);
setTimeout(()=>t.remove(),6000);
}
setInterval(floatText,1500);

/* ================= RUNAWAY YES BUTTON ================= */

const yesBtn=document.getElementById("yesBtn");
yesBtn.style.left="40px";
yesBtn.style.top="220px";

function moveYes(){
yesBtn.style.left=Math.random()*220+"px";
yesBtn.style.top=Math.random()*140+"px";
}

yesBtn.addEventListener("mouseover",moveYes);
yesBtn.addEventListener("touchstart",(e)=>{e.preventDefault();moveYes();});

/* ================= FLOW ================= */

function beginJourney(){

document.getElementById("main").innerHTML=`
<h1>Answer accepted ✅</h1>
<p>Scanning emotional history...</p>
<div class="progress"><div class="bar" style="width:20%"></div></div>

`;

setTimeout(stage2,4000);
}

function stage2(){
document.getElementById("main").innerHTML=`

`;
setTimeout(stage3,4000);

function stage3(){
document.getElementById("main").innerHTML=`

}

function stage4(){

    <p>
        did i reply to you?
        </p>
        <p>
            yes
            </p>

        did i make a whole WEBSITEEE 
        </p>
    <p>
        also yes

<p>Emotional attachment detected.</p>
<p>Denial levels: high</p>
<div class="progress"><div class="bar" style="width:70%"></div></div>
`;
setTimeout(stage5,4000);
}

function stage5(){
document.getElementById("main").innerHTML=`
<h1>Countdown ⏳</h1>
<h2>3</h2>
`;

let c=3;
let t=setInterval(()=>{
document.querySelector("h2").innerText=c;
c--;
if(c<0){clearInterval(t);finalStage();}

}

/* ================= FINAL AGREEMENT ================= */

function finalStage(){

document.getElementById("main").innerHTML=`
<h1> you drama king</h1>
<p> why would you think i hate you...you were def ragbaiting...and i fell victim</p>

<p>Do you agree?</p>

<button onclick="agreed()" style="background:#7b1e3a;color:white;position:absolute;left:30px;">Yes 🤭</button>

</div>

const no=document.getElementById("noBtn2");

function moveNo(){
no.style.left=Math.random()*200+"px";

/* ================= AGREED ================= */

function agreed(){

/* ================= JOKE PAGE ================= */

function checkAnswer(){

</script>

</body>
</html>
